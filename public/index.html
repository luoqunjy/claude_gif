<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>运营小助手 · Ops Assistant</title>
<link rel="stylesheet" href="/theme.css">
<link rel="stylesheet" href="/mascot.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌸%3C/text%3E%3C/svg%3E">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">🌸</div>
      <div>
        <div class="brand-name">运营小助手</div>
        <div class="brand-sub">Ops Assistant</div>
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-section-title">工具</div>
      <nav id="feature-nav"></nav>
    </div>

    <div class="sidebar-footer">
      <div class="llm-switcher" id="llm-switcher" hidden>
        <label class="llm-switcher-label">使用模型</label>
        <select id="llm-select"></select>
      </div>
      <button id="btn-open-settings" class="btn-settings">
        <span>🔑</span><span>API 设置</span>
      </button>
      <div id="llm-status" class="llm-status">
        <span class="dot"></span><span class="llm-text">加载中…</span>
      </div>
    </div>
  </aside>

  <main class="workspace" id="workspace">
    <div class="loading-page"><span class="spinner"></span>加载中...</div>
  </main>
</div>

<!-- API 设置弹窗 -->
<div class="modal" id="settings-modal" hidden>
  <div class="modal-backdrop"></div>
  <div class="modal-card">
    <div class="modal-header">
      <h2>🔑 LLM API 设置</h2>
      <button class="modal-close" id="settings-close" aria-label="关闭">×</button>
    </div>

    <div class="modal-body">
      <div class="settings-banner">
        <strong>🔒 安全说明</strong>
        <span>API Key 仅保存在你当前浏览器（localStorage），不会上传云端。换浏览器 / 换设备 / 换域名时需重新填入 —— 建议点下方「💾 导出」保存一份备份文件，日后「📂 导入」一秒恢复。</span>
      </div>

      <div class="provider-tabs" id="provider-tabs"></div>
      <div class="provider-form" id="provider-form"></div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" id="settings-import" title="从 JSON 备份文件恢复">📂 导入</button>
      <button class="btn btn-ghost btn-sm" id="settings-export" title="把当前所有配置下载为 JSON 备份">💾 导出</button>
      <div style="flex:1"></div>
      <button class="btn btn-secondary" id="settings-cancel">取消</button>
      <button class="btn btn-primary" id="settings-save">保存</button>
    </div>
  </div>
</div>

<script src="/mascot.js"></script>
<script type="module" src="/shell.js"></script>
</body>
</html>
